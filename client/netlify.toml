# Netlify config. NOTE: the Netlify site's "Base directory" must be set to
# `client` for this file to be picked up (see DEPLOY.md); the build runs here.

[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# VITE_SERVER_URL is deliberately NOT set here. The previous version of this
# file had it under `[env.production]`, which was wrong twice over:
#
#   1. `[env]` is not a valid netlify.toml section. Netlify reads build-time env
#      vars from `[build.environment]` and `[context.<name>.environment]`, so
#      everything under `[env]` was silently ignored — it looked configured
#      while doing nothing.
#   2. The value it held (`wss://…`) is wrong for boardgame.io's SocketIO
#      transport, which wants a bare `host:port` or an `http(s)://` URL and
#      negotiates the WebSocket upgrade itself. See the comments in
#      `client/src/App.tsx` and `client/.env.example`.
#
# Set VITE_SERVER_URL in the Netlify dashboard (Site settings → Environment) to
# the Render URL — `https://…`, never `wss://` and never `http://` (the browser
# blocks http as mixed content on an https site).
#
# If you'd rather commit it, the correct form is:
#
#   [context.production.environment]
#     VITE_SERVER_URL = "https://three-kingdoms-kill-server.onrender.com"
